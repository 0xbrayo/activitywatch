name: Build Tauri

on:
  push:
    branches: [master]
    tags:
      - v*
  pull_request:
    branches: [master]

jobs:
  build:
    name: ${{ matrix.os }}, py-${{ matrix.python_version }}, node-${{ matrix.node_version }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    env:
      # Whether to build and include extras (like aw-notify and aw-watcher-input)
      AW_EXTRAS: true
      TAURI_BUILD: true
      # sets the macOS version target, see: https://users.rust-lang.org/t/compile-rust-binary-for-older-versions-of-mac-osx/38695
      MACOSX_DEPLOYMENT_TARGET: 10.9
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        os:
          [
            ubuntu-24.04,
            ubuntu-24.04-arm,
            windows-latest,
            macos-latest,
          ]
        python_version: [3.9]
        node_version: [22]
        skip_rust: [false]
        skip_webui: [false]
        experimental: [false]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: Set environment variables
        run: |
          echo "RELEASE=${{ startsWith(github.ref_name, 'v') || github.ref_name == 'master' }}" >> $GITHUB_ENV
          echo "TAURI_BUILD=true" >> $GITHUB_ENV

      - name: Set tag metadata
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "VERSION_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}

      - name: Set up Node
        if: ${{ !matrix.skip_webui }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}

      - name: Set up Rust
        if: ${{ !matrix.skip_rust }}
        uses: dtolnay/rust-toolchain@master
        id: toolchain
        with:
          toolchain: stable

      - name: Cache node_modules
        uses: actions/cache@v5
        if: ${{ !matrix.skip_webui }}
        with:
          path: |
            aw-server-rust/aw-webui/node_modules
            aw-tauri/node_modules
          key: ${{ matrix.os }}-node_modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ matrix.os }}-node_modules-

      - name: Cache cargo build
        uses: actions/cache@v5
        env:
          cache-name: cargo-build-target
        with:
          path: |
            aw-server-rust/target
            aw-tauri/src-tauri/target
          key: ${{ matrix.os }}-${{ env.cache-name }}-${{ steps.toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-${{ env.cache-name }}-${{ steps.toolchain.outputs.rustc_hash }}-

      - name: Install APT dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            xdg-utils

      - name: Install dependencies
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            choco install innosetup
          fi
          pip3 install poetry==1.4.2

      - name: Build
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 60
          max_attempts: 3
          shell: bash
          command: |
            python3 -m venv venv
            source venv/bin/activate || source venv/Scripts/activate
            poetry install
            make build SKIP_WEBUI=${{ matrix.skip_webui }} SKIP_SERVER_RUST=${{ matrix.skip_rust }}
            pip freeze
        env:
          # Signs aw-tauri's bundles and emits .sig files for the updater
          # (createUpdaterArtifacts is enabled in aw-tauri/src-tauri/tauri.conf.json)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Run tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 60
          max_attempts: 3
          shell: bash
          command: |
            source venv/bin/activate || source venv/Scripts/activate
            make test SKIP_SERVER_RUST=${{ matrix.skip_rust }}

      - name: Package
        run: |
          source venv/bin/activate || source venv/Scripts/activate
          poetry install
          make package SKIP_SERVER_RUST=${{ matrix.skip_rust }}

      - name: Package dmg
        if: runner.os == 'macOS'
        run: |
          if [ -n "$APPLE_EMAIL" ]; then
            ./scripts/ci/import-macos-p12.sh
          fi

          source venv/bin/activate
          make dist/ActivityWatch.dmg

          if [ -n "$APPLE_EMAIL" ]; then
            codesign --force --verbose --timestamp -s ${APPLE_PERSONALID} dist/ActivityWatch.dmg

            brew install akeru-inc/tap/xcnotary
            xcnotary precheck dist/ActivityWatch.app
            xcnotary precheck dist/ActivityWatch.dmg

            make dist/notarize
          fi
          mv dist/ActivityWatch.dmg dist/activitywatch-tauri-${VERSION_TAG:-$(scripts/package/getversion.sh)}-macos-$(uname -m).dmg
        env:
          APPLE_EMAIL: ${{ secrets.APPLE_EMAIL }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_PERSONALID: ${{ secrets.APPLE_TEAMID }}
          APPLE_TEAMID: ${{ secrets.APPLE_TEAMID }}
          CERTIFICATE_MACOS_P12_BASE64: ${{ secrets.CERTIFICATE_MACOS_P12_BASE64 }}
          CERTIFICATE_MACOS_P12_PASSWORD: ${{ secrets.CERTIFICATE_MACOS_P12_PASSWORD }}

      - name: Package Tauri updater artifacts
        run: |
          set -euo pipefail
          mkdir -p dist/updater
          VERSION=$(./scripts/package/getversion.sh | sed 's/^v//')

          case "$RUNNER_OS" in
            macOS) OS_NAME="darwin" ;;
            Linux) OS_NAME="linux" ;;
            Windows) OS_NAME="windows" ;;
          esac
          case "$(uname -m)" in
            arm64|aarch64) ARCH_NAME="aarch64" ;;
            x86_64|amd64) ARCH_NAME="x86_64" ;;
            *) ARCH_NAME="$(uname -m)" ;;
          esac
          PLATFORM_KEY="${OS_NAME}-${ARCH_NAME}"

          # Only the bundle formats Tauri's updater actually consumes -
          # avoids picking up .sig files for .deb/.rpm/.dmg if those ever
          # get signed too, which would collide on the same platform key.
          found=0
          while IFS= read -r -d '' sig; do
            artifact="${sig%.sig}"
            if [ -f "$artifact" ]; then
              base="${artifact##*/}"
              ext="${base#*.}" # everything after the first dot, e.g. "app.tar.gz"
              out="dist/updater/activitywatch-tauri-${VERSION}-${PLATFORM_KEY}.${ext}"
              cp "$artifact" "$out"
              cp "$sig" "$out.sig"
              found=$((found + 1))
            fi
          done < <(find aw-tauri/src-tauri/target -type f \( \
            -path "*/release/bundle/macos/*.sig" -o \
            -path "*/release/bundle/appimage/*.sig" -o \
            -path "*/release/bundle/nsis/*.sig" -o \
            -path "*/release/bundle/msi/*.sig" \
            \) -print0)

          echo "Found $found Tauri updater artifact(s) for $PLATFORM_KEY"
          ls -la dist/updater/ || true

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: builds-tauri-${{ matrix.os }}-py${{ matrix.python_version }}
          path: |
            dist/activitywatch-*.*
            dist/updater/*

  release-notes:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
          fetch-depth: 0

      - uses: ActivityWatch/check-version-format-action@v2
        id: version
        with:
          prefix: "v"

      - name: Echo version
        run: |
          echo "${{ steps.version.outputs.full }} (stable: ${{ steps.version.outputs.is_stable }})"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install requests

      - name: Generate release notes
        run: |
          LAST_RELEASE=`STABLE_ONLY=${{ steps.version.output.is_stable }} ./scripts/get_latest_release.sh`
          ./scripts/build_changelog.py --range "$LAST_RELEASE...${{ steps.version.outputs.full }}"

      - name: Rename
        run: |
          mv changelog.md release_notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release_notes_tauri
          path: release_notes.md

  release:
    needs: [build, release-notes]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Display structure of downloaded files
        run: ls -R
        working-directory: dist

      - uses: ActivityWatch/check-version-format-action@v2
        id: version
        with:
          prefix: "v"

      - name: Generate latest.json
        run: |
          python3 scripts/package/generate_latest_json.py \
            --version "$(./scripts/package/getversion.sh | sed 's/^v//')" \
            --notes "ActivityWatch ${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --tag "${{ github.ref_name }}" \
            --dist dist \
            --output dist/latest.json
          cat dist/latest.json

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: |
            dist/*/activitywatch-*.*
            dist/latest.json
          body_path: dist/release_notes_tauri/release_notes.md
          prerelease: ${{ !(steps.version.outputs.is_stable == 'true') }}  # must compare to true, since boolean outputs are actually just strings, and "false" is truthy since it's not empty: https://github.com/actions/runner/issues/1483#issuecomment-994986996
